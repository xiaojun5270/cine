name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "ipa-*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare build log
        run: : > xcodebuild.log

      - name: Select Xcode 26
        run: |
          {
            set -e
            xcodes="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V || true)"
            if [ -z "${xcodes}" ]; then
              echo "Xcode 26 is required for native Liquid Glass and iOS 26 SDK."
              ls -1 /Applications | grep Xcode || true
              exit 1
            fi
            printf 'Available Xcode 26 installations:\n'
            printf '%s\n' "${xcodes}"
            selected="$(printf '%s\n' "${xcodes}" | tail -n 1)"
            echo "Selecting ${selected}"
            sudo xcode-select -s "${selected}"
          } 2>&1 | tee -a xcodebuild.log
          exit "${PIPESTATUS[0]}"

      - name: Show Xcode version
        run: |
          {
            xcodebuild -version
            xcodebuild -list -project CineChill.xcodeproj
          } 2>&1 | tee -a xcodebuild.log

      - name: Build unsigned IPA
        id: build
        continue-on-error: true
        run: |
          chmod +x scripts/package-unsigned-ipa.sh
          set -o pipefail
          scripts/package-unsigned-ipa.sh 2>&1 | tee xcodebuild.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Summarize build failure
        if: steps.build.outputs.exit_code != '0'
        run: |
          {
            echo "### xcodebuild failed"
            echo
            echo '```text'
            tail -n 220 xcodebuild.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "${{ steps.build.outputs.exit_code }}"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: ignore

      - name: Publish build log branch
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/ci-build-logs
          cd /tmp/ci-build-logs
          git init -b ci-build-logs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin ci-build-logs || true
          if git rev-parse --verify origin/ci-build-logs; then
            git checkout -B ci-build-logs origin/ci-build-logs
          fi
          mkdir -p "runs/${GITHUB_RUN_ID}"
          cp "${GITHUB_WORKSPACE}/xcodebuild.log" "runs/${GITHUB_RUN_ID}/xcodebuild.log"
          git add "runs/${GITHUB_RUN_ID}/xcodebuild.log"
          git commit -m "Add build log for ${GITHUB_RUN_ID}" || true
          git push origin ci-build-logs

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CineChill-unsigned-ipa
          path: build/unsigned-ipa/CineChill-unsigned.ipa
          if-no-files-found: error
